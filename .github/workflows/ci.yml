name: Next.js CI/CD Quality Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './my-app/package-lock.json'

    - name: Install dependencies
      working-directory: ./my-app
      run: npm ci --legacy-peer-deps

    - name: Run Next.js Build Check
      working-directory: ./my-app
      env:
        # Database
        MONGODB_ATLAS_URI: ${{ secrets.MONGODB_ATLAS_URI }}
        
        # Stripe (Required because build collects data for Stripe-related pages)
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
        
        # Auth v5 Fallbacks
        AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'dummy_build_secret_32_chars_long_minimum' }}
        AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID || 'dummy_id' }}
        AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || 'dummy_secret' }}
        
      run: npm run build