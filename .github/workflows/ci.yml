name: Next.js CI/CD Quality Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './my-app/package-lock.json'

    - name: Install dependencies
      working-directory: ./my-app
      # Added flag to override the strict npm peer dependency lock
      run: npm ci --legacy-peer-deps

    - name: Run Next.js Build Check
      working-directory: ./my-app
      env:
        MONGODB_ATLAS_URI: ${{ secrets.MONGODB_ATLAS_URI }}
        # Added build-time environment variable fallbacks for NextAuth v5
        AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'dummy_build_secret_32_chars_long_minimum' }}
        AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID || 'dummy_id' }}
        AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || 'dummy_secret' }}
      run: npm run build
